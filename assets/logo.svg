<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="lockGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.95" />
      <stop offset="100%" style="stop-color:#e3f2fd;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="fingerprintGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#42a5f5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1565c0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#0d47a1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Shield body -->
  <path d="M256 28 L462 100 C462 100 470 280 256 484 C42 280 50 100 50 100 Z"
        fill="url(#shieldGrad)" filter="url(#shadow)" />

  <!-- Shield inner border -->
  <path d="M256 52 L440 116 C440 116 447 272 256 460 C65 272 72 116 72 116 Z"
        fill="none" stroke="#ffffff" stroke-width="2" stroke-opacity="0.25" />

  <!-- Fingerprint arcs (representing TLS fingerprinting) -->
  <g transform="translate(256, 240)" fill="none" stroke-linecap="round" stroke-opacity="0.9">
    <!-- Outer arc -->
    <path d="M-70,30 A80,80 0 0,1 -70,-50" stroke="#90caf9" stroke-width="8"/>
    <path d="M70,30 A80,80 0 0,0 70,-50" stroke="#90caf9" stroke-width="8"/>
    <!-- Middle arc -->
    <path d="M-48,20 A55,55 0 0,1 -48,-40" stroke="#bbdefb" stroke-width="7"/>
    <path d="M48,20 A55,55 0 0,0 48,-40" stroke="#bbdefb" stroke-width="7"/>
    <!-- Inner arc -->
    <path d="M-26,10 A32,32 0 0,1 -26,-28" stroke="#e3f2fd" stroke-width="6"/>
    <path d="M26,10 A32,32 0 0,0 26,-28" stroke="#e3f2fd" stroke-width="6"/>
  </g>

  <!-- Lock body -->
  <rect x="216" y="222" width="80" height="60" rx="8" ry="8" fill="url(#lockGrad)" />

  <!-- Lock shackle -->
  <path d="M232 222 L232 198 A24 24 0 0 1 280 198 L280 222"
        fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" stroke-opacity="0.95"/>

  <!-- Lock keyhole -->
  <circle cx="256" cy="246" r="8" fill="#1a73e8"/>
  <rect x="253" y="248" width="6" height="14" rx="2" fill="#1a73e8"/>

  <!-- Probe signal waves (representing active probing) -->
  <g transform="translate(256, 150)" fill="none" stroke-linecap="round">
    <path d="M-40,-8 Q-20,-28 0,-8 Q20,12 40,-8" stroke="#ffcc02" stroke-width="5" stroke-opacity="0.9"/>
    <path d="M-30,8 Q-10,-8 10,8 Q30,24 50,8" stroke="#ffcc02" stroke-width="4" stroke-opacity="0.6"/>
  </g>

  <!-- TSI text -->
  <text x="256" y="340" text-anchor="middle" font-family="'Segoe UI',Helvetica,Arial,sans-serif"
        font-size="64" font-weight="800" fill="#ffffff" letter-spacing="12">TSI</text>
</svg>
